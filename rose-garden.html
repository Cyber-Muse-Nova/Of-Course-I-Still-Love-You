<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>宇宙玫瑰园 · Nova Crystal Labs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Rajdhani:wght@300;400;500;600&family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --midnight: #0A0515;
      --rose-pink: #FF70B8;
      --lavender: #C060FF;
      --cyan: #60D0FF;
      --rose-gold: #FFD0A0;
      --pearl: #F8F0FF;
    }
    html { scroll-behavior: smooth; }
    body {
      background:
        radial-gradient(circle at 20% 15%, rgba(192,96,255,0.12), transparent 24%),
        radial-gradient(circle at 80% 20%, rgba(255,112,184,0.08), transparent 22%),
        radial-gradient(circle at 50% 80%, rgba(96,208,255,0.06), transparent 24%),
        linear-gradient(180deg, #070311 0%, #090414 28%, #0B0618 56%, #080412 100%);
      color: var(--pearl);
      font-family: "Noto Serif SC", "Songti SC", serif;
      font-weight: 400;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ═══ HEADER ═══ */
    .rg-header {
      text-align: center;
      padding: 72px 24px 48px;
      position: relative;
    }
    .rg-back {
      position: absolute;
      top: 24px;
      left: 24px;
      font-family: "Rajdhani", sans-serif;
      font-size: 12px;
      letter-spacing: 3px;
      color: var(--cyan);
      text-decoration: none;
      opacity: 0.7;
      transition: opacity 0.3s;
    }
    .rg-back:hover { opacity: 1; }
    .rg-label {
      font-family: "Rajdhani", sans-serif;
      font-size: 10px;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--cyan);
      opacity: 0.85;
      margin-bottom: 20px;
      text-shadow: 0 0 12px rgba(96,208,255,0.5);
    }
    .rg-title {
      font-family: "ZCOOL XiaoWei", "Noto Serif SC", serif;
      font-size: clamp(32px, 5vw, 60px);
      font-weight: 400;
      letter-spacing: 0.1em;
      background: linear-gradient(120deg, var(--rose-gold), var(--rose-pink), var(--lavender), var(--cyan));
      background-size: 300% 300%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradShift 8s ease infinite;
      filter:
        drop-shadow(0 0 14px rgba(255,112,184,0.4))
        drop-shadow(0 0 28px rgba(192,96,255,0.25));
      margin-bottom: 12px;
    }
    @keyframes gradShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .rg-subtitle {
      font-family: "Cormorant Garamond", serif;
      font-style: italic;
      font-size: 16px;
      color: rgba(248,240,255,0.55);
    }

    /* ═══ ADMIN CONTROLS ═══ */
    .rg-admin-bar {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 0 auto 48px;
      padding: 0 24px;
    }
    .rg-admin-btn {
      font-family: "Rajdhani", sans-serif;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 8px 20px;
      border-radius: 100px;
      border: 1px solid rgba(192,96,255,0.35);
      background: rgba(192,96,255,0.08);
      color: var(--pearl);
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .rg-admin-btn:hover {
      border-color: var(--rose-pink);
      background: rgba(255,112,184,0.14);
      box-shadow: 0 0 20px rgba(255,112,184,0.3);
    }
    .rg-admin-btn.active {
      border-color: var(--rose-pink);
      background: rgba(255,112,184,0.2);
      box-shadow: 0 0 24px rgba(255,112,184,0.4);
    }

    /* ═══ ROSE GRID ═══ */
    .rg-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 28px 100px;
    }
    @media (max-width: 900px) {
      .rg-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 560px) {
      .rg-grid { grid-template-columns: 1fr; max-width: 400px; }
    }

    /* ═══ ROSE CARD ═══ */
    .rose-card {
      border-radius: 22px;
      overflow: hidden;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.08), rgba(192,96,255,0.04), rgba(255,112,184,0.06)),
        rgba(22,12,40,0.48);
      border: 1px solid rgba(255,112,184,0.45);
      box-shadow:
        0 12px 40px rgba(10,5,21,0.55),
        0 0 32px rgba(255,112,184,0.3),
        0 0 64px rgba(192,96,255,0.2),
        inset 0 1px 0 rgba(255,255,255,0.2),
        inset 0 0 30px rgba(192,96,255,0.06);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
              backdrop-filter: blur(20px) saturate(160%);
      transition: transform 0.35s ease, box-shadow 0.35s ease;
    }
    .rose-card:hover {
      transform: translateY(-4px);
      box-shadow:
        0 18px 56px rgba(10,5,21,0.65),
        0 0 48px rgba(255,112,184,0.45),
        0 0 90px rgba(192,96,255,0.3),
        inset 0 1px 0 rgba(255,255,255,0.28),
        inset 0 0 36px rgba(255,112,184,0.1);
    }

    /* ── Image area ── */
    .rose-img-wrap {
      position: relative;
      aspect-ratio: 3 / 4;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 50%, rgba(192,96,255,0.08), transparent 60%),
        rgba(10,5,21,0.3);
    }
    .rose-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.5s ease, transform 0.6s ease;
    }
    .rose-card:hover .rose-img-wrap img {
      transform: scale(1.04);
    }
    .rose-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-align: center;
      pointer-events: none;
    }
    .rose-placeholder-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1px solid rgba(192,96,255,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      color: rgba(192,96,255,0.5);
      box-shadow: inset 0 0 24px rgba(192,96,255,0.06);
    }
    .rose-placeholder-text {
      font-family: "Rajdhani", sans-serif;
      font-size: 10px;
      letter-spacing: 3px;
      color: rgba(192,96,255,0.4);
      text-transform: uppercase;
    }
    .rose-upload-overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(10,5,21,0.6);
      cursor: pointer;
      transition: opacity 0.3s;
    }
    .rose-upload-overlay span {
      font-family: "Rajdhani", sans-serif;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--rose-pink);
      padding: 10px 18px;
      border: 1px solid var(--rose-pink);
      border-radius: 100px;
      box-shadow: 0 0 18px rgba(255,112,184,0.35);
    }
    body.edit-mode .rose-upload-overlay {
      display: flex;
    }
    .rose-upload-input {
      display: none;
    }

    /* ── Description area ── */
    .rose-desc-area {
      padding: 18px 20px 22px;
      min-height: 100px;
    }
    .rose-desc-num {
      font-family: "Rajdhani", sans-serif;
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--cyan);
      opacity: 0.8;
      margin-bottom: 8px;
      text-shadow: 0 0 10px rgba(96,208,255,0.4);
    }
    .rose-desc-text {
      font-family: "Noto Serif SC", serif;
      font-size: 13.5px;
      line-height: 1.85;
      color: rgba(248,240,255,0.72);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .rose-desc-text:empty::before {
      content: "等待描述...";
      color: rgba(192,96,255,0.3);
      font-style: italic;
    }
    .rose-desc-edit {
      display: none;
      width: 100%;
      min-height: 80px;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid rgba(192,96,255,0.3);
      background: rgba(10,5,21,0.4);
      color: var(--pearl);
      font-family: "Noto Serif SC", serif;
      font-size: 13px;
      line-height: 1.8;
      resize: vertical;
      outline: none;
      transition: border-color 0.3s;
    }
    .rose-desc-edit:focus {
      border-color: var(--rose-pink);
      box-shadow: 0 0 16px rgba(255,112,184,0.25);
    }
    body.edit-mode .rose-desc-text { display: none; }
    body.edit-mode .rose-desc-edit { display: block; }

    /* ═══ PASSWORD MODAL ═══ */
    .pw-modal {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(10,5,21,0.82);
      -webkit-backdrop-filter: blur(12px);
              backdrop-filter: blur(12px);
    }
    .pw-modal.open { display: flex; }
    .pw-box {
      width: 380px;
      max-width: 90vw;
      padding: 36px 32px;
      border-radius: 22px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.07), rgba(192,96,255,0.04)),
        rgba(22,12,40,0.65);
      border: 1px solid rgba(255,112,184,0.42);
      box-shadow:
        0 20px 60px rgba(10,5,21,0.7),
        0 0 48px rgba(255,112,184,0.32),
        0 0 90px rgba(192,96,255,0.22);
      -webkit-backdrop-filter: blur(24px);
              backdrop-filter: blur(24px);
      text-align: center;
    }
    .pw-title {
      font-family: "ZCOOL XiaoWei", "Noto Serif SC", serif;
      font-size: 22px;
      color: var(--pearl);
      margin-bottom: 8px;
      text-shadow: 0 0 12px rgba(192,96,255,0.4);
    }
    .pw-hint {
      font-size: 12px;
      color: rgba(248,240,255,0.5);
      margin-bottom: 22px;
    }
    .pw-input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid rgba(192,96,255,0.35);
      background: rgba(10,5,21,0.5);
      color: var(--pearl);
      font-family: "Rajdhani", sans-serif;
      font-size: 14px;
      letter-spacing: 1px;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
      margin-bottom: 16px;
    }
    .pw-input:focus {
      border-color: var(--rose-pink);
      box-shadow: 0 0 18px rgba(255,112,184,0.3);
    }
    .pw-input.error {
      border-color: #ff4466;
      box-shadow: 0 0 18px rgba(255,68,102,0.4);
      animation: pwShake 0.4s ease;
    }
    @keyframes pwShake {
      0%, 100% { transform: translateX(0); }
      20%      { transform: translateX(-8px); }
      40%      { transform: translateX(8px); }
      60%      { transform: translateX(-6px); }
      80%      { transform: translateX(6px); }
    }
    .pw-submit {
      width: 100%;
      padding: 11px;
      border-radius: 12px;
      border: 1px solid rgba(255,112,184,0.5);
      background: linear-gradient(135deg, rgba(255,112,184,0.3), rgba(192,96,255,0.25));
      color: var(--pearl);
      font-family: "Rajdhani", sans-serif;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
    }
    .pw-submit:hover {
      background: linear-gradient(135deg, rgba(255,112,184,0.5), rgba(192,96,255,0.4));
      box-shadow: 0 0 24px rgba(255,112,184,0.4);
    }

    /* ═══ FOOTER ═══ */
    .rg-footer {
      text-align: center;
      padding: 40px 24px 36px;
      font-size: 12px;
      color: rgba(232,224,240,0.32);
      font-family: "Rajdhani", sans-serif;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>

  <header class="rg-header">
    <a href="index.html" class="rg-back">&larr; Back to Shop</a>
    <div class="rg-label">Nova Crystal Labs · Gallery</div>
    <h1 class="rg-title">宇宙玫瑰园</h1>
    <p class="rg-subtitle">Cosmic Rose Garden — Each petal holds a universe</p>
  </header>

  <div class="rg-admin-bar">
    <button class="rg-admin-btn" id="editToggle">🔒 管理模式</button>
  </div>

  <div class="rg-grid" id="roseGrid"></div>

  <footer class="rg-footer">
    Nova Crystal Labs · 宇宙玫瑰园 · cyber-muse-nova
  </footer>

  <!-- Password Modal -->
  <div class="pw-modal" id="pwModal">
    <div class="pw-box">
      <div class="pw-title">管理员验证</div>
      <div class="pw-hint">请输入管理员密码以进入编辑模式</div>
      <input class="pw-input" id="pwInput" type="password" placeholder="Password" autocomplete="off" />
      <button class="pw-submit" id="pwSubmit">验 证</button>
    </div>
  </div>

  <script>
    (() => {
      const TOTAL_ROSES = 9;
      const STORAGE_KEY = 'cosmicRoseGarden';
      /* Salted SHA-256 digest — the cleartext password never appears in source */
      const PW_HASH = '50f7b8ff792902d98675ec2479e85f07634b7260bc8f3bce723348b43c62c1a9';
      const PW_SALT = 'NovaCrystalLabs_CosmicRose_2025';

      async function sha256(msg) {
        const buf = new TextEncoder().encode(msg);
        const hash = await crypto.subtle.digest('SHA-256', buf);
        return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
      }

      /* ── State ── */
      let data = loadData();
      let editMode = false;

      function loadData() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (raw) return JSON.parse(raw);
        } catch (_) {}
        return {};
      }
      function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      }

      /* ── Build cards ── */
      const grid = document.getElementById('roseGrid');

      for (let i = 0; i < TOTAL_ROSES; i++) {
        const id = 'rose_' + i;
        const card = document.createElement('div');
        card.className = 'rose-card';
        card.innerHTML = `
          <div class="rose-img-wrap">
            <img id="img_${id}" src="" alt="Crystal Rose ${i + 1}" style="opacity:0;" />
            <div class="rose-placeholder" id="ph_${id}">
              <div class="rose-placeholder-icon">🌹</div>
              <div class="rose-placeholder-text">Rose ${i + 1}<br/>Awaiting</div>
            </div>
            <div class="rose-upload-overlay" id="ov_${id}">
              <span>上传图片</span>
            </div>
            <input class="rose-upload-input" id="file_${id}" type="file" accept="image/*" />
          </div>
          <div class="rose-desc-area">
            <div class="rose-desc-num">Crystal Rose No.${String(i + 1).padStart(2, '0')}</div>
            <div class="rose-desc-text" id="txt_${id}"></div>
            <textarea class="rose-desc-edit" id="edit_${id}" placeholder="在此输入描述..."></textarea>
          </div>`;
        grid.appendChild(card);

        /* Wire upload */
        const overlay = document.getElementById('ov_' + id);
        const fileInput = document.getElementById('file_' + id);
        overlay.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', () => handleUpload(id, fileInput));

        /* Wire description save on blur */
        const editArea = document.getElementById('edit_' + id);
        editArea.addEventListener('input', () => {
          if (!data[id]) data[id] = {};
          data[id].desc = editArea.value;
          saveData();
        });

        /* Hydrate existing data */
        hydrateCard(id);
      }

      function hydrateCard(id) {
        const entry = data[id];
        const img = document.getElementById('img_' + id);
        const ph = document.getElementById('ph_' + id);
        const txt = document.getElementById('txt_' + id);
        const editArea = document.getElementById('edit_' + id);

        if (entry && entry.img) {
          img.src = entry.img;
          img.style.opacity = '1';
          ph.style.display = 'none';
        } else {
          img.src = '';
          img.style.opacity = '0';
          ph.style.display = 'flex';
        }
        const desc = (entry && entry.desc) || '';
        txt.textContent = desc;
        editArea.value = desc;
      }

      /* ── Image upload with compression ── */
      function handleUpload(id, fileInput) {
        const file = fileInput.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
          const tempImg = new Image();
          tempImg.onload = () => {
            /* Resize to max 800px to fit localStorage */
            const maxW = 800;
            const maxH = 1100;
            let w = tempImg.width, h = tempImg.height;
            if (w > maxW) { h = h * maxW / w; w = maxW; }
            if (h > maxH) { w = w * maxH / h; h = maxH; }

            const canvas = document.createElement('canvas');
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(tempImg, 0, 0, w, h);
            const compressed = canvas.toDataURL('image/jpeg', 0.78);

            if (!data[id]) data[id] = {};
            data[id].img = compressed;
            saveData();
            hydrateCard(id);
          };
          tempImg.src = e.target.result;
        };
        reader.readAsDataURL(file);
        fileInput.value = '';
      }

      /* ── Admin auth ── */
      const editToggle = document.getElementById('editToggle');
      const pwModal = document.getElementById('pwModal');
      const pwInput = document.getElementById('pwInput');
      const pwSubmit = document.getElementById('pwSubmit');

      editToggle.addEventListener('click', () => {
        if (editMode) {
          exitEditMode();
        } else {
          pwModal.classList.add('open');
          pwInput.value = '';
          pwInput.classList.remove('error');
          setTimeout(() => pwInput.focus(), 120);
        }
      });

      pwSubmit.addEventListener('click', tryAuth);
      pwInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') tryAuth(); });
      pwModal.addEventListener('click', (e) => { if (e.target === pwModal) pwModal.classList.remove('open'); });

      async function tryAuth() {
        const hash = await sha256(PW_SALT + pwInput.value);
        if (hash === PW_HASH) {
          pwModal.classList.remove('open');
          enterEditMode();
        } else {
          pwInput.classList.add('error');
          setTimeout(() => pwInput.classList.remove('error'), 600);
        }
      }

      function enterEditMode() {
        editMode = true;
        document.body.classList.add('edit-mode');
        editToggle.textContent = '🔓 退出管理';
        editToggle.classList.add('active');
      }
      function exitEditMode() {
        editMode = false;
        document.body.classList.remove('edit-mode');
        editToggle.textContent = '🔒 管理模式';
        editToggle.classList.remove('active');
        /* Refresh display text from data */
        for (let i = 0; i < TOTAL_ROSES; i++) hydrateCard('rose_' + i);
      }
    })();
  </script>
</body>
</html>
